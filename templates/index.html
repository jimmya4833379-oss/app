<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask + TinyDB 專案</title>
    <!-- 引入自訂 CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>我的健康飲食日記</h1>
        <p>記錄每天的飲食與熱量攝取</p>
        
        <!-- 飲食紀錄表單 -->
        <div class="form-section">
            <h2>新增飲食紀錄</h2>
            <form id="diet-form">
                <div class="form-group">
                    <label for="foodName">食物名稱</label>
                    <input type="text" id="foodName" name="foodName" placeholder="例如：蘋果、便當" required>
                </div>
                <div class="form-group">
                    <label for="time">時間</label>
                    <input type="time" id="time" name="time" required>
                </div>
                <div class="form-group">
                    <label for="portion">分量</label>
                    <input type="number" id="portion" name="portion" step="0.1" min="0.1" value="1" required>
                </div>
                <button type="submit" class="submit-btn">記錄！</button>
            </form>
        </div>

        <!-- 今日紀錄區塊 -->
        <div class="record-section">
            <h2>今日飲食清單 <span class="calorie-badge" id="total-calories">總熱量: 0 大卡</span></h2>
            <ul class="diet-list" id="diet-list">
                <!-- 紀錄將透過 JS 動態產生 -->
            </ul>
        </div>
        
        <div class="status-card" id="api-status">
            載入後端狀態中...
        </div>
    </div>

    <!-- 引入自訂 JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
